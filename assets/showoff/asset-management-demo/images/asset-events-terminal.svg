<line x1="0.5" y1="278" x2="719.5" y2="278" stroke="#1C2432"/>
<text x="20" y="296" class="meta">keeper@localhost:3000</text>
<text x="700" y="296" class="meta" text-anchor="end">immutable · audited</text>
</svg>
