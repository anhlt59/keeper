version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zoo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoo
      POSTGRES_PASSWORD: zoo_dev_password
      POSTGRES_DB: zoo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoo -d zoo_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    driver: local
